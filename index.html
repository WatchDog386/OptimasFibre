<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Optmas Fibre</title>

    <!-- Meta Description for SEO -->
    <meta name="description" content="Optmas Fibre provides reliable, high-speed fibre internet for homes and businesses in Kenya. Affordable packages, great uptime, and 24/7 support." />

    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:title" content="Optmas Fibre" />
    <meta property="og:description" content="Reliable fibre internet for home and business. Explore packages, coverage, and more." />
    <meta property="og:image" content="/oppo.jpg" />
    <meta property="og:url" content="/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Optmas Fibre" />
    <meta name="twitter:description" content="Unlimited internet for your home with Optmas Fibre – Home of Fibre Internet" />
    <meta name="twitter:image" content="/logo4.webp" />

    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="/oppo.jpg" />

    <!-- Optional: Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#1e3a8a" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            spacing: {
              'full': '100%',
            },
            maxWidth: {
              'full': '100%',
            }
          }
        }
      }
    </script>
    
    <style>
      /* Reset margins and padding for full-width layout */
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }
      
      .theme-transition * {
        transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      
      /* Custom toggle switch */
      .toggle-checkbox:checked {
        right: 0;
        border-color: #4F46E5;
      }
      
      .toggle-checkbox:checked + .toggle-label {
        background-color: #4F46E5;
      }
      
      /* Ensure all containers are full width */
      .container {
        width: 100%;
        max-width: 100%;
      }
      
      /* Full-width utility classes */
      .full-width {
        width: 100vw;
        position: relative;
        left: 50%;
        right: 50%;
        margin-left: -50vw;
        margin-right: -50vw;
      }
      
      /* Content container with original sizing */
      .content-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }
      
      /* Responsive adjustments */
      @media (max-width: 768px) {
        .content-container {
          padding: 0 0.5rem;
        }
      }
    </style>
  </head>
  <body class="bg-white dark:bg-slate-900 text-gray-900 dark:text-white theme-transition p-0 m-0 w-full">
    <div id="root" class="w-full"></div>
    
    <!-- Theme toggle script -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Check for saved theme preference or use system preference
        const savedTheme = localStorage.getItem('theme') || 
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        
        // Apply the saved theme
        if (savedTheme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        
        // Create a global function to toggle theme
        window.toggleTheme = function() {
          const isDark = document.documentElement.classList.toggle('dark');
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
          return isDark ? 'dark' : 'light';
        };
      });
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
